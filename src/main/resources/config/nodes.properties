# JAVACoin Node Configuration
# This file defines the six-node network topology

# Node Roles and Ports
# Format: node.<id>.role=<ROLE>
# Format: node.<id>.port=<PORT>

# Admin/Monitor Node - Port 8080
node.0.role=ADMIN
node.0.port=8080
node.0.name=Admin-Monitor

# Miner Creator Node - Port 8081
node.1.role=MINER
node.1.port=8081
node.1.name=Miner-Creator

# Miner Competitor Node - Port 8082
node.2.role=MINER
node.2.port=8082
node.2.name=Miner-Competitor

# User Node: Alice - Port 8083
node.3.role=USER
node.3.port=8083
node.3.name=Alice

# User Node: Bob - Port 8084
node.4.role=USER
node.4.port=8084
node.4.name=Bob

# User Node: Charlie - Port 8085
node.5.role=USER
node.5.port=8085
node.5.name=Charlie

# Peer List (P2P ports for node-to-node communication)
# Format: peers=<HOST>:<P2P_PORT>,<HOST>:<P2P_PORT>,...
# Note: Each node will filter out its own port from this list

peers=localhost:9080,localhost:9081,localhost:9082,localhost:9083,localhost:9084,localhost:9085

# Mining Configuration
mining.difficulty=5
mining.target.block.time.seconds=5
mining.block.reward=50.0

# Network Configuration
network.host=localhost
network.connection.timeout.ms=5000
network.max.retry.attempts=3

# Genesis Block Configuration
genesis.timestamp=1609459200000
genesis.message=JAVACoin Genesis Block - The Future of Decentralized Currency

# UTXO and Transaction Settings
transaction.min.fee=0.0
transaction.default.fee=1.0
utxo.confirmation.threshold=6

# Logging Configuration
log.level=INFO
log.directory=logs
log.file.max.size.mb=10


